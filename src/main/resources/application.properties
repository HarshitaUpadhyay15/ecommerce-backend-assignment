spring.application.name=ecommerce-backend-assignment

# H2 Database
spring.datasource.url=jdbc:h2:mem:ecommercedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Config
app.jwt.secret=${JWT_SECRET:your_secure_jwt_secret_key_must_be_provided_via_env}
app.jwt.expiration-ms=86400000

# Stripe Config (Test Keys - replace with real test key)
stripe.api.key=${STRIPE_API_KEY:sk_test_placeholder}

# App Configs
app.currency=usd
cors.allowed.origins=http://localhost:3000

# Logging
logging.level.com.example.ecommerce=DEBUG
